version: "3.8"
services:
  anggota:
    build: ./anggota-service
    ports: ["8081:8081"]
  buku:
    build: ./buku-service
    ports: ["8082:8082"]
  peminjaman:
    build: ./peminjaman-service
    ports: ["8083:8083"]
  pengembalian:
    build: ./pengembalian-service
    ports: ["8084:8084"]

  # Tambahkan Prometheus & Grafana seperti di jawaban sebelumnya
  prometheus:
    build:
      context: .
      dockerfile: Dockerfile-prom
    ports:
      - "9090:9090"

  loki:
    build:
      context: .
      dockerfile: Dockerfile-loki
    ports:
      - "3100:3100"
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports: ["3000:3000"]
