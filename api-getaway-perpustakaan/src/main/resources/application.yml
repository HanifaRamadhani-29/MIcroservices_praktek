server:
  port: 9002

spring:
  application:
    name: API-GETAWAY-PERPUSTAKAAN

  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: anggota
              uri: lb://anggota-service
              predicates:
                - Path=/api/anggota/**
            - id: buku
              uri: lb://buku-service
              predicates:
                - Path=/api/buku/**
            - id: peminjaman
              uri: lb://peminjaman-service
              predicates:
                - Path=/api/peminjaman/**
            - id: pengembalian
              uri: lb://pengembalian-service
              predicates:
                - Path=/api/pengembalian/**
